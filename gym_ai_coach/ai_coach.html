<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AI Coach</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a;
    font-family:-apple-system,'Helvetica Neue',sans-serif;
    touch-action:manipulation;-webkit-tap-highlight-color:transparent;
    user-select:none;-webkit-user-select:none}
  #container{position:relative;width:100%;height:100%}
  canvas{display:block;position:absolute;top:0;left:0}

  #loading{position:absolute;top:0;left:0;width:100%;height:100%;
    background:#0a0a0a;z-index:20;display:flex;flex-direction:column;
    align-items:center;justify-content:center;transition:opacity .3s}
  #loading.hidden{opacity:0;pointer-events:none}
  #loading .ring{width:44px;height:44px;border:3px solid #1a1a1a;
    border-top-color:#00ff64;border-radius:50%;animation:spin .7s linear infinite;margin-bottom:18px}
  @keyframes spin{to{transform:rotate(360deg)}}
  #loading .status{font-size:12px;color:#555;letter-spacing:1px;margin-top:4px}

  #toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
    background:rgba(0,0,0,.9);color:#00ff64;font-size:26px;font-weight:700;
    padding:12px 32px;border-radius:10px;z-index:15;
    transition:transform .12s ease-out;pointer-events:none;letter-spacing:2px}
  #toast.show{transform:translate(-50%,-50%) scale(1)}

  #tabs{position:absolute;bottom:max(20px,env(safe-area-inset-bottom,20px));
    left:50%;transform:translateX(-50%);display:flex;gap:12px;z-index:10}
  #tabs button{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
    color:#888;font-size:12px;padding:9px 20px;border-radius:18px;letter-spacing:1px;transition:all .2s}
  #tabs button.active{color:#00ff64;border-color:#00ff64;background:rgba(0,255,100,.08)}
</style>
</head>
<body>

<div id="container">
  <video id="video" playsinline autoplay muted style="display:none"></video>
  <canvas id="output"></canvas>

  <div id="loading">
    <div class="ring"></div>
    <p class="status" id="loadStatus">LOADING</p>
  </div>

  <div id="toast">+1</div>

  <div id="tabs">
    <button id="btnSquat" class="active">SQUAT</button>
    <button id="btnCurl">BICEP CURL</button>
    <button id="btnReset">RESET</button>
  </div>
</div>

<!-- ====== MediaPipe from unpkg (better in China) ====== -->
<script>
// CDN 源列表，第一个失败自动换
const CDN_LIST = [
  'https://unpkg.com/@mediapipe',
  'https://cdn.jsdelivr.net/npm/@mediapipe',
];
var CDN = CDN_LIST[0];
var MP_VER = '0.5.1675469404';

function setStatus(msg) {
  document.getElementById('loadStatus').textContent = msg;
}

// 动态加载脚本
function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = () => reject(new Error(`Failed: ${src}`));
    document.head.appendChild(s);
  });
}

async function loadMediaPipe() {
  setStatus('LOADING SDK...');
  for (let i = 0; i < CDN_LIST.length; i++) {
    try {
      CDN = CDN_LIST[i];
      const base = `${CDN}/pose@${MP_VER}/`;
      await loadScript(`${CDN}/camera_utils@${MP_VER}/camera_utils.js`);
      await loadScript(`${CDN}/control_utils@${MP_VER}/control_utils.js`);
      await loadScript(`${CDN}/drawing_utils@${MP_VER}/drawing_utils.js`);
      await loadScript(`${base}pose.js`);
      setStatus('SDK OK');
      return;
    } catch(e) {
      console.warn(`CDN ${CDN} failed, trying next...`);
      setStatus(`CDN FAILED, RETRY...`);
    }
  }
  throw new Error('All CDNs failed');
}

// 等 DOM + SDK 加载完再启动
window.addEventListener('DOMContentLoaded', async () => {
  try {
    await loadMediaPipe();
    setStatus('STARTING CAMERA...');
    await startCamera();
  } catch(e) {
    setStatus(`ERROR: ${e.message}`);
    console.error(e);
  }
});
</script>

<script>
// ======== 业务逻辑（等 MediaPipe SDK 就绪后执行）========
const BONES=[[11,12],[11,23],[12,24],[23,24],[23,25],[24,26],[25,27],[26,28],[11,13],[13,15],[12,14],[14,16]];
const R_HIP=24,R_KNEE=26,R_ANKLE=28,R_SHOULDER=12,R_ELBOW=14,R_WRIST=16;

let exercise='squat',repCount=0,repState='up',dispAngle=180,status='stand';
let fps=0,flashA=0,toastT=0,fpsQ=[],lastT=0;
let pose=null;

const video=document.getElementById('video');
const canvas=document.getElementById('output');
const ctx=canvas.getContext('2d');
const toast=document.getElementById('toast');
const loading=document.getElementById('loading');

function resize(){
  const dpr=window.devicePixelRatio||1;
  canvas.width=innerWidth*dpr;canvas.height=innerHeight*dpr;
  canvas.style.width=innerWidth+'px';canvas.style.height=innerHeight+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resize();
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>setTimeout(resize,200));

function angle3(ax,ay,bx,by,cx,cy){
  const vx1=ax-bx,vy1=ay-by,vx2=cx-bx,vy2=cy-by;
  const dot=vx1*vx2+vy1*vy2,m1=Math.sqrt(vx1*vx1+vy1*vy1),m2=Math.sqrt(vx2*vx2+vy2*vy2);
  if(m1<1e-6||m2<1e-6)return 0;
  return Math.acos(Math.max(-1,Math.min(1,dot/(m1*m2))))*180/Math.PI;
}

const LIMITS={squat:{min:85,max:155},bicep_curl:{min:50,max:150}};

function updateRep(){
  const lim=LIMITS[exercise];
  if(repState==='up'&&dispAngle<lim.min)repState='down';
  else if(repState==='down'&&dispAngle>lim.max){repState='up';repCount++;flashA=1;showToast();}
}

function showToast(){toastT=35;toast.classList.add('show');}

function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();ctx.fill();}

function drawFrame(lm,w,h){
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,w,h);
  ctx.strokeStyle='rgba(255,255,255,.012)';ctx.lineWidth=.5;
  for(let x=0;x<w;x+=50){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke()}
  for(let y=0;y<h;y+=50){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke()}

  if(lm){
    const pts={};
    for(let i=0;i<lm.length;i++)if(lm[i].visibility>.5)pts[i]=[lm[i].x*w,lm[i].y*h];
    ctx.strokeStyle='rgba(0,255,100,.85)';ctx.lineWidth=2.2;ctx.lineCap='round';
    for(const[a,b]of BONES)if(pts[a]&&pts[b]){ctx.beginPath();ctx.moveTo(...pts[a]);ctx.lineTo(...pts[b]);ctx.stroke()}
    for(const p of Object.values(pts)){
      ctx.beginPath();ctx.arc(p[0],p[1],5,0,Math.PI*2);ctx.fillStyle='#0a0a0a';ctx.fill();
      ctx.strokeStyle='#00ff64';ctx.lineWidth=2;ctx.stroke();
      ctx.beginPath();ctx.arc(p[0],p[1],2.5,0,Math.PI*2);ctx.fillStyle='#00ff64';ctx.fill();
    }
    let ax,ay;
    if(exercise==='squat'&&pts[R_KNEE]){[ax,ay]=pts[R_KNEE]}
    else if(exercise!=='squat'&&pts[R_ELBOW]){[ax,ay]=pts[R_ELBOW]}
    if(ax!==undefined){
      const c=status==='good'?'#00ff64':status==='shallow'?'#3ca0ff':'#888';
      ctx.font='bold 20px -apple-system,sans-serif';ctx.fillStyle=c;
      ctx.fillText(`${dispAngle.toFixed(0)}°`,ax+20,ay-14);
    }
  }else{
    ctx.font='bold 28px -apple-system,sans-serif';ctx.fillStyle='#333';ctx.textAlign='center';
    ctx.fillText('STAND IN FRAME',w/2,h/2-10);
    ctx.font='13px -apple-system,sans-serif';ctx.fillStyle='#282828';
    ctx.fillText(exercise==='squat'?'Stand sideways to camera':'Face the camera',w/2,h/2+28);
    ctx.textAlign='start';
  }

  if(flashA>0){ctx.fillStyle=`rgba(0,255,100,${flashA*.2})`;ctx.fillRect(0,0,w,h);flashA-=.025}

  // UI 顶部
  ctx.fillStyle='rgba(10,10,10,.82)';ctx.fillRect(0,0,w,68);
  ctx.font='11px -apple-system,sans-serif';ctx.fillStyle='#555';ctx.fillText('AI COACH',16,26);
  ctx.font='bold 20px -apple-system,sans-serif';ctx.fillStyle='#eee';
  ctx.fillText(exercise==='squat'?'SQUAT':'BICEP CURL',16,52);
  ctx.font='10px -apple-system,sans-serif';ctx.fillStyle='#555';ctx.textAlign='right';
  ctx.fillText(`FPS ${fps.toFixed(0)}`,w-16,26);ctx.textAlign='start';

  // REP
  const rx=w-140;
  ctx.font='11px -apple-system,sans-serif';ctx.fillStyle='#555';ctx.fillText('REPS',rx,h*.26);
  ctx.font='bold 58px -apple-system,sans-serif';ctx.fillStyle='#fff';ctx.fillText(repCount.toString(),rx,h*.26+52);

  // 角度面板
  const py=h*.34+68;
  ctx.fillStyle='rgba(20,20,20,.88)';
  const label=exercise==='squat'?'KNEE':'ELBOW';
  roundRect(rx-14,py,136,104,10);
  ctx.font='10px -apple-system,sans-serif';ctx.fillStyle='#555';ctx.fillText(`${label} ANGLE`,rx,py+22);
  const ac=status==='good'?'#00ff64':status==='shallow'?'#3ca0ff':'#888';
  ctx.font='bold 34px -apple-system,sans-serif';ctx.fillStyle=ac;ctx.fillText(`${dispAngle.toFixed(0)}°`,rx,py+56);
  const st=status==='good'?'GOOD DEPTH':status==='shallow'?'GO LOWER':'STAND BY';
  ctx.font='bold 13px -apple-system,sans-serif';ctx.fillStyle=ac;ctx.fillText(st,rx,py+90);

  ctx.font='10px -apple-system,sans-serif';ctx.fillStyle='#2a2a2a';
  ctx.fillText('10-YEAR GYM  |  AI POWERED',16,h-12);
}

function initPose(){
  pose=new Pose({locateFile:(f)=>`${CDN}/pose@${MP_VER}/${f}`});
  pose.setOptions({modelComplexity:1,smoothLandmarks:true,enableSegmentation:false,minDetectionConfidence:.7,minTrackingConfidence:.7});
  pose.onResults(r=>{
    const w=innerWidth,h=innerHeight;
    const now=performance.now();
    if(lastT){fpsQ.push(1000/(now-lastT));if(fpsQ.length>30)fpsQ.shift()}
    lastT=now;fps=fpsQ.reduce((a,b)=>a+b,0)/Math.max(1,fpsQ.length);
    if(r.poseLandmarks){
      const lm=r.poseLandmarks;
      if(exercise==='squat'){
        const hip=lm[R_HIP],knee=lm[R_KNEE],ank=lm[R_ANKLE];
        dispAngle=angle3(hip.x*w,hip.y*h,knee.x*w,knee.y*h,ank.x*w,ank.y*h);
      }else{
        const sho=lm[R_SHOULDER],elb=lm[R_ELBOW],wri=lm[R_WRIST];
        dispAngle=angle3(sho.x*w,sho.y*h,elb.x*w,elb.y*h,wri.x*w,wri.y*h);
      }
      const lim=LIMITS[exercise];
      status=dispAngle>=lim.max?'stand':dispAngle<=lim.min?'good':'shallow';
      updateRep();drawFrame(lm,w,h);
    }else{drawFrame(null,w,h)}
    if(toastT>0){toastT--;if(toastT===0)toast.classList.remove('show')}
  });
}

async function startCamera(){
  initPose();
  const stream=await navigator.mediaDevices.getUserMedia({
    video:{facingMode:'user',width:{ideal:1280},height:{ideal:720}},audio:false
  });
  video.srcObject=stream;await video.play();
  setStatus('RUNNING');
  setTimeout(()=>loading.classList.add('hidden'),500);
  (function loop(){if(video.readyState>=2)pose.send({image:video});requestAnimationFrame(loop)})();
}

function switchExercise(ex){exercise=ex;repCount=0;repState='up';document.querySelectorAll('#tabs button').forEach(b=>b.classList.remove('active'));document.getElementById(ex==='squat'?'btnSquat':'btnCurl').classList.add('active')}
document.getElementById('btnSquat').onclick=()=>switchExercise('squat');
document.getElementById('btnCurl').onclick=()=>switchExercise('bicep_curl');
document.getElementById('btnReset').onclick=()=>{repCount=0;repState='up'};
</script>
</body>
</html>
